spring.application.name=VIP-Center-Fit
server.port=${PORT:8080}

##nombre de la BD  es "gym" recuerdalo 
# ===========================================
# BASE DE DATOS
# ===========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gym?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ===========================================
# JPA / HIBERNATE
# ===========================================
# Hibernate gestiona el esquema automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging detallado
logging.level.com.gimnasio.fit=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

# ===========================================
# MERCADO PAGO
# ===========================================
# IMPORTANTE: Configurar estas credenciales en variables de entorno en producción
# Los valores reales se deben configurar como variables de entorno:
# export MP_ACCESS_TOKEN="APP_USR-8475xxxx..." (reemplazar xxxx con valor real)
# export MP_PUBLIC_KEY="APP_USR-82fdxxxx..." (reemplazar xxxx con valor real)
mercadopago.access.token=${MP_ACCESS_TOKEN:}
mercadopago.public.key=${MP_PUBLIC_KEY:}

# ===========================================
# FLYWAY (MIGRACIONES DE BD)
# ===========================================
# Flyway DESHABILITADO - JPA gestiona el esquema
# Las tablas ya existen, Flyway causaría conflictos
spring.flyway.enabled=false
# spring.flyway.baseline-on-migrate=true
# spring.flyway.locations=classpath:db/migration
# spring.flyway.validate-on-migrate=false

# ===========================================
# JWT (SEGURIDAD)
# ===========================================
app.security.jwt.secret=${JWT_SECRET:pon_un_secreto_de_32+_caracteres_aqui}
app.security.jwt.access-expiration-seconds=3600
app.security.jwt.refresh-expiration-seconds=604800

# ===========================================
# WEBHOOK PUBLICO (NGROK)
# ===========================================
app.webhook.base=${WEBHOOK_BASE:http://localhost:8080}

# ===========================================
# EMAIL (NOTIFICACIONES)
# ===========================================
# Para Gmail: habilitar "Aplicaciones menos seguras" o usar "App Password"
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Configuracion del remitente
app.email.from=${EMAIL_FROM:VIP Center Fit <no-reply@vipcentergym.com>}
app.email.enabled=${EMAIL_ENABLED:true}

# ===========================================
# SMS/WhatsApp (NOTIFICACIONES) - Twilio
# ===========================================
# Obtener credenciales en: https://www.twilio.com/console
# IMPORTANTE: Si usas cuenta TRIAL, debes verificar cada numero receptor en:
# https://console.twilio.com/us1/develop/phone-numbers/manage/verified
# IMPORTANTE: Configurar estas credenciales en variables de entorno en producción
# Los valores reales se deben configurar como variables de entorno:
# export TWILIO_ACCOUNT_SID="ACda01xxxx..." (reemplazar xxxx con valor real)
# export TWILIO_AUTH_TOKEN="8c6ec9xxxx..." (reemplazar xxxx con valor real)
# export TWILIO_FROM_NUMBER="+14155238886" (número de Twilio WhatsApp Sandbox)
app.sms.enabled=${SMS_ENABLED:true}
app.whatsapp.enabled=${WHATSAPP_ENABLED:true}
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.twilio.from-number=${TWILIO_FROM_NUMBER:}
app.twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# ===========================================
# SEGURIDAD DE LOGIN
# ===========================================
# Numero maximo de intentos de login fallidos antes de bloquear cuenta
app.security.max-login-attempts=5

# Duration del bloqueo temporal en horas (tras superar max-login-attempts)
app.security.lockout-duration-hours=24

# ===========================================
# CORS (SEGURIDAD WEB)
# ===========================================
# Origenes permitidos para CORS (separados por coma)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===========================================
# VARIABLES DE ENTORNO REQUERIDAS
# ===========================================
# Para produccion, configure estas variables de entorno:
# ADMIN_EMAIL=admin@tugimnasio.com
# ADMIN_PASSWORD=TuPasswordSegura123
# Si no se configuran, se usaran valores por defecto (INSEGURO para produccion)
# El usuario admin inicial sera creado con debe_cambiar_password=true
